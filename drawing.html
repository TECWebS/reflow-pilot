<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swelli — Drawing</title>
<link rel="stylesheet" href="style.css">
<style>
  .draw-layout{ display:grid; grid-template-columns: 230px 1fr; gap:20px; align-items:start; }
  .tools{ display:flex; flex-direction:column; gap:18px; }
  .swatches{ display:grid; grid-template-columns: repeat(5,1fr); gap:8px; }
  .swatch{ width:100%; aspect-ratio:1; border-radius:50%; border:3px solid transparent; }
  .swatch.selected{ border-color: var(--ink); transform: scale(1.05); }
  .tool-label{ font-weight:800; font-size:13px; color: var(--ink-soft); margin-bottom:8px; display:block; }
  .canvas-wrap{
    background:#fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
    padding: 14px; display:flex; flex-direction:column; align-items:center;
  }
  .canvas-stack{ position:relative; width:100%; max-width:680px; aspect-ratio: 4/3; }
  .canvas-stack canvas{
    position:absolute; top:0; left:0; width:100%; height:100%;
    border-radius: var(--radius-md); touch-action:none;
  }
  #drawCanvas{ border:2px dashed var(--line); background:#fff; }
  #previewCanvas{ pointer-events:none; }
  .range-row{ display:flex; align-items:center; gap:10px; }
  .draw-actions{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 14px; }
  .fill-row{ display:flex; align-items:center; gap:10px; }
  .mini-switch{ width:40px; height:22px; border-radius:999px; background: var(--line); position:relative; border:none; padding:0; flex-shrink:0; }
  .mini-switch .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition: left .15s; }
  .mini-switch.checked{ background: var(--mint-deep); }
  .mini-switch.checked .knob{ left:20px; }
  .sticker-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .sticker-btn{ font-size:22px; padding:4px; background:none; border:2px solid var(--line); border-radius:8px; }
  .sticker-btn:hover{ border-color:var(--mint); }
  @media (max-width: 760px){ .draw-layout{ grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-name">Swelli for Education</span></div>
  <nav>
    <a href="home.html">Home</a>
    <a href="settings.html">Settings</a>
  </nav>
</div>

<div class="page">
  <h1 class="display" style="margin-bottom:16px; display:flex; align-items:center; gap:10px;"><svg class="icon icon-md" style="color:var(--coral);"><use href="icons.svg#icon-palette"/></svg>Drawing</h1>

  <div class="draw-layout">
    <div class="card tools">
      <div>
        <span class="tool-label">Tools</span>
        <div class="tool-grid">
          <button class="tool-btn" data-tool="pencil" aria-label="Pencil"><svg class="icon"><use href="icons.svg#icon-pencil"/></svg></button>
          <button class="tool-btn" data-tool="line" aria-label="Line"><svg class="icon"><use href="icons.svg#icon-shape-line"/></svg></button>
          <button class="tool-btn" data-tool="rect" aria-label="Rectangle"><svg class="icon"><use href="icons.svg#icon-shape-rect"/></svg></button>
          <button class="tool-btn" data-tool="circle" aria-label="Circle"><svg class="icon"><use href="icons.svg#icon-shape-circle"/></svg></button>
          <button class="tool-btn" data-tool="eraser" aria-label="Eraser"><svg class="icon"><use href="icons.svg#icon-eraser"/></svg></button>
          <button class="tool-btn" data-tool="move" aria-label="Move shape" style="font-size:10px;font-weight:800;flex-direction:column;gap:1px;">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M13 6v5h5V7l4 4-4 4v-4h-5v5h4l-4 4-4-4h4v-5H8v4l-4-4 4-4v4h5V6h-4l4-4 4 4h-4z"/></svg>
            <span style="font-size:9px;">Move</span>
          </button>
        </div>
      </div>

      <div>
        <span class="tool-label">Colors</span>
        <div class="swatches" id="swatches"></div>
      </div>

      <div>
        <span class="tool-label">Brush size</span>
        <div class="range-row">
          <span style="font-size:10px;">●</span>
          <input type="range" id="brushSize" min="2" max="36" value="8" style="flex:1;">
          <span style="font-size:20px;">●</span>
        </div>
      </div>

      <div class="fill-row" id="fillRow" style="display:none;">
        <button type="button" class="mini-switch" id="fillSwitch" role="switch" aria-checked="false"><span class="knob"></span></button>
        <label for="fillSwitch" style="font-weight:700; font-size:13px;">Fill shape</label>
      </div>

      <button class="btn btn-ghost" id="clearBtn"><svg class="icon icon-sm"><use href="icons.svg#icon-trash"/></svg>&nbsp; Clear page</button>

      <div>
        <span class="tool-label">Stamp a shape</span>
        <div class="tool-grid" id="shapeStamps"></div>
      </div>

      <div>
        <span class="tool-label">Stamp a sticker</span>
        <div class="sticker-row" id="stickerRow"></div>
      </div>
    </div>

    <div class="canvas-wrap">
      <div class="canvas-stack">
        <canvas id="drawCanvas"></canvas>
        <canvas id="previewCanvas"></canvas>
      </div>
      <div class="draw-actions">
        <button class="btn btn-primary" id="saveDrawBtn">Save my drawing</button>
        <button class="btn btn-secondary" id="downloadBtn"><svg class="icon icon-sm"><use href="icons.svg#icon-download"/></svg>&nbsp; Download</button>
      </div>
      <p style="font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:8px;text-align:center;">Stamp a shape → it switches to Move tool so you can drag it right away</p>
    </div>
  </div>
</div>

<div class="toast" id="toast">Nice work! Your drawing was saved.</div>

<script src="data.js"></script>
<script>
  Swelli.requireSession();
  Swelli.setupAvatarPill();

  // Set pencil as the default active tool
  document.querySelector('.tool-btn[data-tool="pencil"]').classList.add('active');

  const colors = ['#25393A','#FF8A65','#F4B740','#3FB3A2','#6CC6FF','#C77DFF','#FF6B9A','#7BD389','#8B5E3C','#FFFFFF'];
  const swatchWrap = document.getElementById('swatches');
  let currentColor = colors[0];
  colors.forEach((c,i)=>{
    const b = document.createElement('button');
    b.className = 'swatch' + (i===0?' selected':'');
    b.style.background = c;
    if(c === '#FFFFFF') b.style.border = '3px solid var(--line)';
    b.addEventListener('click', ()=>{
      currentColor = c;
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
      b.classList.add('selected');
    });
    swatchWrap.appendChild(b);
  });

  let tool = 'pencil';
  const fillRow = document.getElementById('fillRow');
  const fillSwitch = document.getElementById('fillSwitch');
  let fillShape = false;
  fillSwitch.addEventListener('click', ()=>{
    fillShape = !fillShape;
    fillSwitch.classList.toggle('checked', fillShape);
    fillSwitch.setAttribute('aria-checked', String(fillShape));
  });
  document.querySelectorAll('.tool-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tool = btn.dataset.tool;
      document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      fillRow.style.display = (tool === 'rect' || tool === 'circle') ? 'flex' : 'none';
    });
  });

  const drawCanvas = document.getElementById('drawCanvas');
  const previewCanvas = document.getElementById('previewCanvas');
  const ctx = drawCanvas.getContext('2d');
  const pctx = previewCanvas.getContext('2d');

  function fitCanvas(canvas, context, preserve){
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    let prev = null;
    if(preserve){
      prev = document.createElement('canvas');
      prev.width = canvas.width; prev.height = canvas.height;
      prev.getContext('2d').drawImage(canvas,0,0);
    }
    canvas.width = rect.width * ratio;
    canvas.height = rect.height * ratio;
    context.scale(ratio, ratio);
    if(preserve){
      context.fillStyle = '#fff';
      context.fillRect(0,0,rect.width,rect.height);
      if(prev) context.drawImage(prev, 0, 0, prev.width/ratio, prev.height/ratio);
    }
    return rect;
  }
  function fitAll(){
    fitCanvas(drawCanvas, ctx, true);
    fitCanvas(previewCanvas, pctx, false);
  }
  window.addEventListener('resize', fitAll);
  fitAll();

  let drawing = false, startX=0, startY=0, lastX=0, lastY=0;
  function pos(e){
    const rect = drawCanvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function strokeStyleFor(){
    pctx.strokeStyle = tool === 'eraser' ? '#ffffff' : currentColor;
    pctx.fillStyle = tool === 'eraser' ? '#ffffff' : currentColor;
    ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : currentColor;
    ctx.fillStyle = tool === 'eraser' ? '#ffffff' : currentColor;
    const w = document.getElementById('brushSize').value;
    pctx.lineWidth = w; ctx.lineWidth = w;
    pctx.lineCap = 'round'; pctx.lineJoin = 'round';
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  }

  function drawShape(context, x0, y0, x1, y1){
    context.beginPath();
    if(tool === 'line'){
      context.moveTo(x0,y0); context.lineTo(x1,y1); context.stroke();
    } else if(tool === 'rect'){
      const w = x1-x0, h = y1-y0;
      if(fillShape) context.fillRect(x0,y0,w,h); else context.strokeRect(x0,y0,w,h);
    } else if(tool === 'circle'){
      const rx = Math.abs(x1-x0)/2, ry = Math.abs(y1-y0)/2;
      const cx = (x0+x1)/2, cy = (y0+y1)/2;
      context.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);
      if(fillShape) context.fill(); else context.stroke();
    }
  }

  function onDown(e){
    drawCanvas.setPointerCapture && drawCanvas.setPointerCapture(e.pointerId);
    drawing = true;
    const p = pos(e);
    startX = lastX = p.x; startY = lastY = p.y;
    strokeStyleFor();
  }
  function onMove(e){
    if(!drawing) return;
    const p = pos(e);
    if(tool === 'pencil' || tool === 'eraser'){
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(p.x,p.y);
      ctx.stroke();
      lastX = p.x; lastY = p.y;
    } else {
      const rect = previewCanvas.getBoundingClientRect();
      pctx.clearRect(0,0,rect.width,rect.height);
      drawShape(pctx, startX, startY, p.x, p.y);
    }
  }
  function onUp(e){
    if(!drawing) return;
    drawing = false;
    if(tool === 'line' || tool === 'rect' || tool === 'circle'){
      const p = pos(e);
      drawShape(ctx, startX, startY, p.x, p.y);
      const rect = previewCanvas.getBoundingClientRect();
      pctx.clearRect(0,0,rect.width,rect.height);
    }
  }

  drawCanvas.addEventListener('pointerdown', onDown);
  drawCanvas.addEventListener('pointermove', onMove);
  drawCanvas.addEventListener('pointerup', onUp);
  drawCanvas.addEventListener('pointercancel', onUp);
  drawCanvas.addEventListener('pointerleave', (e)=>{ if(tool==='pencil'||tool==='eraser') drawing=false; });

  document.getElementById('clearBtn').addEventListener('click', ()=>{
    const rect = drawCanvas.getBoundingClientRect();
    ctx.fillStyle = '#fff';
    ctx.fillRect(0,0,rect.width,rect.height);
  });

  // ---- Moveable shape objects layer ----
  // Shapes live as objects here so they can be selected and dragged.
  // On save/download they get merged (flattened) onto the main canvas.
  const shapeObjects = []; // { type, x, y, size, color }
  let selectedShape = null;
  let draggingShape = false;
  let dragOffX = 0, dragOffY = 0;

  function drawShapeObj(ctx2, obj){
    ctx2.fillStyle = obj.color;
    ctx2.strokeStyle = obj.color;
    ctx2.lineWidth = 2;
    ctx2.lineJoin = 'round';
    const {x,y,size:s} = obj;
    ctx2.beginPath();
    switch(obj.type){
      case 'heart':
        ctx2.moveTo(x,y-s*0.3); ctx2.bezierCurveTo(x,y-s*0.6,x+s*0.5,y-s*0.6,x+s*0.5,y-s*0.3); ctx2.bezierCurveTo(x+s*0.5,y,x,y+s*0.4,x,y+s*0.4); ctx2.bezierCurveTo(x,y+s*0.4,x-s*0.5,y,x-s*0.5,y-s*0.3); ctx2.bezierCurveTo(x-s*0.5,y-s*0.6,x,y-s*0.6,x,y-s*0.3); break;
      case 'star':
        for(let i=0;i<10;i++){ const r=i%2===0?s:s*0.4,a=Math.PI*i/5-Math.PI/2; i===0?ctx2.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):ctx2.lineTo(x+r*Math.cos(a),y+r*Math.sin(a)); } break;
      case 'circle':
        ctx2.arc(x,y,s*0.5,0,Math.PI*2); break;
      case 'rect':
        ctx2.rect(x-s*0.5,y-s*0.4,s,s*0.8); break;
      case 'triangle':
        ctx2.moveTo(x,y-s*0.5); ctx2.lineTo(x+s*0.5,y+s*0.4); ctx2.lineTo(x-s*0.5,y+s*0.4); break;
      case 'diamond':
        ctx2.moveTo(x,y-s*0.5); ctx2.lineTo(x+s*0.4,y); ctx2.lineTo(x,y+s*0.5); ctx2.lineTo(x-s*0.4,y); break;
      case 'sun':
        ctx2.arc(x,y,s*0.32,0,Math.PI*2); ctx2.fill(); ctx2.beginPath();
        for(let i=0;i<8;i++){ const a=Math.PI*2*i/8; ctx2.moveTo(x+s*0.38*Math.cos(a),y+s*0.38*Math.sin(a)); ctx2.lineTo(x+s*0.52*Math.cos(a),y+s*0.52*Math.sin(a)); }
        ctx2.strokeStyle=obj.color; ctx2.lineWidth=3; ctx2.stroke(); return;
      case 'arrow':
        ctx2.moveTo(x-s*0.5,y-s*0.12); ctx2.lineTo(x+s*0.1,y-s*0.12); ctx2.lineTo(x+s*0.1,y-s*0.3); ctx2.lineTo(x+s*0.5,y); ctx2.lineTo(x+s*0.1,y+s*0.3); ctx2.lineTo(x+s*0.1,y+s*0.12); ctx2.lineTo(x-s*0.5,y+s*0.12); break;
      case 'cloud':
        ctx2.arc(x-s*0.18,y,s*0.3,Math.PI,0); ctx2.arc(x+s*0.18,y,s*0.3,Math.PI,0);
        ctx2.arc(x,y-s*0.18,s*0.26,Math.PI,0); ctx2.arc(x-s*0.32,y,s*0.2,0,Math.PI); ctx2.arc(x+s*0.32,y,s*0.2,0,Math.PI); break;
      case 'flower':
        for(let i=0;i<5;i++){ const a=Math.PI*2*i/5; const px=x+s*0.28*Math.cos(a),py=y+s*0.28*Math.sin(a); ctx2.beginPath(); ctx2.arc(px,py,s*0.2,0,Math.PI*2); ctx2.fill(); }
        ctx2.beginPath(); ctx2.arc(x,y,s*0.18,0,Math.PI*2); ctx2.fillStyle='#fff'; ctx2.fill(); return;
    }
    ctx2.closePath(); ctx2.fill();
  }

  // Overlay canvas for shape objects
  const shapeCanvas = document.createElement('canvas');
  shapeCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:inherit;pointer-events:none;';
  drawCanvas.parentElement.appendChild(shapeCanvas);
  const sCtx = shapeCanvas.getContext('2d');

  function resizeShapeCanvas(){
    const rect = drawCanvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio||1;
    shapeCanvas.width = rect.width*ratio; shapeCanvas.height = rect.height*ratio;
    sCtx.scale(ratio,ratio);
    renderShapes();
  }
  window.addEventListener('resize', resizeShapeCanvas);

  function renderShapes(){
    const rect = shapeCanvas.getBoundingClientRect();
    sCtx.clearRect(0,0,rect.width*2,rect.height*2);
    shapeObjects.forEach(obj=>{
      drawShapeObj(sCtx, obj);
      if(obj === selectedShape){
        sCtx.strokeStyle='#25393A'; sCtx.lineWidth=2; sCtx.setLineDash([4,3]);
        sCtx.strokeRect(obj.x-obj.size*0.55, obj.y-obj.size*0.55, obj.size*1.1, obj.size*1.1);
        sCtx.setLineDash([]);
      }
    });
  }

  function posFromEvent(e, canvas){
    const rect = canvas.getBoundingClientRect();
    return { x:e.clientX-rect.left, y:e.clientY-rect.top };
  }

  function hitTest(x,y,obj){ return Math.abs(x-obj.x)<obj.size*0.55 && Math.abs(y-obj.y)<obj.size*0.55; }

  // In move-tool mode, shape canvas handles pointer events
  function enableShapeInteraction(){
    shapeCanvas.style.pointerEvents='auto';
    shapeCanvas.addEventListener('pointerdown', shapePointerDown);
  }
  function disableShapeInteraction(){
    shapeCanvas.style.pointerEvents='none';
    shapeCanvas.removeEventListener('pointerdown', shapePointerDown);
  }

  function shapePointerDown(e){
    const p = posFromEvent(e, shapeCanvas);
    let hit = null;
    for(let i=shapeObjects.length-1;i>=0;i--){ if(hitTest(p.x,p.y,shapeObjects[i])){ hit=shapeObjects[i]; break; } }
    selectedShape = hit;
    renderShapes();
    if(hit){
      draggingShape=true; dragOffX=p.x-hit.x; dragOffY=p.y-hit.y;
      shapeCanvas.setPointerCapture(e.pointerId);
      shapeCanvas.addEventListener('pointermove', shapeDrag);
      shapeCanvas.addEventListener('pointerup', shapePointerUp);
    }
  }
  function shapeDrag(e){
    if(!draggingShape||!selectedShape) return;
    const p=posFromEvent(e,shapeCanvas);
    selectedShape.x=p.x-dragOffX; selectedShape.y=p.y-dragOffY;
    renderShapes();
  }
  function shapePointerUp(){
    draggingShape=false;
    shapeCanvas.removeEventListener('pointermove',shapeDrag);
    shapeCanvas.removeEventListener('pointerup',shapePointerUp);
  }

  function flattenShapesToCanvas(){
    const rect = drawCanvas.getBoundingClientRect();
    shapeObjects.forEach(obj=>drawShapeObj(ctx,obj));
    shapeObjects.length=0; selectedShape=null;
    sCtx.clearRect(0,0,rect.width*2,rect.height*2);
  }

  // Track previous tool to re-enable freehand on switch
  let prevTool = 'pencil';
  document.querySelectorAll('.tool-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      tool=btn.dataset.tool;
      document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      fillRow.style.display=(tool==='rect'||tool==='circle')?'flex':'none';
      if(tool==='move'){ enableShapeInteraction(); }
      else { disableShapeInteraction(); }
    });
  });

  // ---- Shape stamps — labeled grid ----
  const SHAPES_DEFS = [
    { id:'heart',    label:'Heart'    },
    { id:'star',     label:'Star'     },
    { id:'circle',   label:'Circle'   },
    { id:'rect',     label:'Square'   },
    { id:'triangle', label:'Triangle' },
    { id:'diamond',  label:'Diamond'  },
    { id:'sun',      label:'Sun'      },
    { id:'arrow',    label:'Arrow'    },
    { id:'cloud',    label:'Cloud'    },
    { id:'flower',   label:'Flower'   },
  ];

  const stampWrap = document.getElementById('shapeStamps');
  SHAPES_DEFS.forEach(sh=>{
    const b=document.createElement('button');
    b.className='tool-btn';
    b.style.cssText='flex-direction:column;gap:2px;padding:8px 4px;font-size:10px;font-weight:800;';
    // Tiny canvas preview
    const miniC=document.createElement('canvas');
    miniC.width=28; miniC.height=28; miniC.style.display='block';
    const mCtx=miniC.getContext('2d');
    drawShapeObj(mCtx,{type:sh.id,x:14,y:14,size:22,color:'#3FB3A2'});
    b.appendChild(miniC);
    b.appendChild(document.createTextNode(sh.label));
    b.addEventListener('click',()=>{
      const rect=drawCanvas.getBoundingClientRect();
      const size=Math.min(rect.width,rect.height)*0.16;
      shapeObjects.push({type:sh.id,x:rect.width/2,y:rect.height/2,size,color:currentColor});
      renderShapes();
      // Auto-switch to move tool so they can drag it right away
      tool='move';
      document.querySelectorAll('.tool-btn[data-tool]').forEach(t=>t.classList.remove('active'));
      document.querySelector('.tool-btn[data-tool="move"]')?.classList.add('active');
      enableShapeInteraction();
    });
    stampWrap.appendChild(b);
  });

  resizeShapeCanvas();

  // ---- Fluent Emoji stickers (stamped via offscreen canvas) ----
  const STICKERS = [
    'fluent-emoji:red-heart','fluent-emoji:star','fluent-emoji:sun',
    'fluent-emoji:rainbow','fluent-emoji:four-leaf-clover','fluent-emoji:fire',
    'fluent-emoji:sparkles','fluent-emoji:seedling','fluent-emoji:balloon',
    'fluent-emoji:trophy','fluent-emoji:musical-note','fluent-emoji:butterfly',
  ];
  const stickerRow = document.getElementById('stickerRow');
  STICKERS.forEach(iconName=>{
    const b = document.createElement('button');
    b.className = 'sticker-btn';
    b.innerHTML = `<iconify-icon icon="${iconName}" width="22" height="22"></iconify-icon>`;
    b.addEventListener('click', ()=>{
      // Render the iconify-icon to a temp image via SVG serialization then draw to canvas
      const iEl = b.querySelector('iconify-icon');
      const svgStr = iEl?.shadowRoot?.querySelector('svg')?.outerHTML;
      if(!svgStr) return;
      const img = new Image();
      const blob = new Blob([svgStr], {type:'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      img.onload = ()=>{
        const rect = drawCanvas.getBoundingClientRect();
        ctx.drawImage(img, rect.width/2 - 30, rect.height/2 - 30, 60, 60);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    });
    stickerRow.appendChild(b);
  });

  const toast = document.getElementById('toast');
  document.getElementById('saveDrawBtn').addEventListener('click', ()=>{
    flattenShapesToCanvas();
    Swelli.saveAndGoHome({ activity:'drawing', activityDetail:'Drew a picture' }, toast);
  });

  document.getElementById('downloadBtn').addEventListener('click', ()=>{
    flattenShapesToCanvas();
    const link = document.createElement('a');
    link.download = 'my-swelli-drawing.png';
    link.href = drawCanvas.toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
