<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swelli — Drawing</title>
<link rel="stylesheet" href="style.css">
<style>
  body{ overflow-x:hidden; }
  .draw-page{ max-width:100%; padding:0; }
  .draw-header{ padding:16px 18px 10px; }

  /* Horizontal toolbar */
  .draw-toolbar{
    background:#fff; border-bottom:2px solid var(--line); padding:12px 14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .toolbar-row{ display:flex; align-items:center; gap:8px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:2px; }
  .toolbar-row::-webkit-scrollbar{ height:3px; }
  .toolbar-row::-webkit-scrollbar-thumb{ background:var(--line); border-radius:99px; }

  /* Tool buttons */
  .t-btn{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; border-radius:var(--radius-sm); border:2px solid var(--line); background:#fff;
    padding:7px 9px; min-width:46px; color:var(--ink); flex-shrink:0;
    font-size:10px; font-weight:800; transition:border-color .12s,background .12s;
  }
  .t-btn:hover{ border-color:var(--mint); background:var(--mint-paler); }
  .t-btn.active{ border-color:var(--coral); background:#FFF1EC; color:var(--coral-deep); }

  /* Color swatches */
  .swatch-row{ display:flex; gap:6px; align-items:center; flex-shrink:0; }
  .t-swatch{ width:28px; height:28px; border-radius:50%; border:3px solid transparent; flex-shrink:0; transition:transform .1s; }
  .t-swatch:hover{ transform:scale(1.15); }
  .t-swatch.selected{ border-color:var(--ink); transform:scale(1.15); }

  /* Size slider inline */
  .size-row{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .size-row span{ font-size:11px; font-weight:800; color:var(--ink-soft); }
  .size-row input{ width:80px; }

  /* Fill toggle inline */
  .fill-pill{ display:flex; align-items:center; gap:6px; font-weight:800; font-size:12px; color:var(--ink-soft); flex-shrink:0; }
  .mini-sw{ width:38px; height:20px; border-radius:999px; background:var(--line); position:relative; border:none; padding:0; flex-shrink:0; }
  .mini-sw .kn{ position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:#fff; transition:left .15s; }
  .mini-sw.checked{ background:var(--mint-deep); }
  .mini-sw.checked .kn{ left:20px; }

  /* Section dividers in toolbar */
  .t-sep{ width:1px; height:36px; background:var(--line); flex-shrink:0; }

  /* Shape stamp row */
  .stamp-row{ display:flex; gap:6px; align-items:center; flex-wrap:nowrap; overflow-x:auto; }
  .stamp-row::-webkit-scrollbar{ height:3px; }
  .stamp-row .t-btn{ min-width:56px; }
  .stamp-preview{ display:block; width:28px; height:28px; }

  /* Sticker row */
  .sticker-row{ display:flex; gap:6px; align-items:center; flex-wrap:nowrap; overflow-x:auto; }
  .sticker-row::-webkit-scrollbar{ height:3px; }
  .s-sticker{ font-size:22px; padding:4px 6px; border:2px solid var(--line); border-radius:8px; background:#fff; flex-shrink:0; }
  .s-sticker:hover{ border-color:var(--mint); }

  /* Canvas area */
  .canvas-section{ padding:0 14px 14px; }
  .canvas-stack{ position:relative; width:100%; aspect-ratio:3/2; max-height:65vh; }
  .canvas-stack canvas{ position:absolute; top:0; left:0; width:100%; height:100%; border-radius:var(--radius-md); touch-action:none; }
  #drawCanvas{ border:2px solid var(--line); background:#fff; }
  #previewCanvas{ pointer-events:none; }
  #shapeCanvas{ border-radius:var(--radius-md); }

  /* Bottom actions */
  .draw-actions{ display:flex; gap:10px; padding:0 14px 16px; flex-wrap:wrap; }

  /* Tip text */
  .draw-tip{ font-size:12px; font-weight:700; color:var(--ink-soft); padding:0 14px 10px; }

  @media (max-width:640px){
    .canvas-stack{ aspect-ratio:4/3; }
    .size-row input{ width:60px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="brand-name">Swelli for Education</span></div>
  <nav><a href="home.html">Home</a><a href="settings.html">Settings</a></nav>
  <span class="avatar-pill" id="avatarPill"><span class="dot" id="avatarDot"></span><span id="pillName">Me</span></span>
</div>

<!-- Horizontal toolbar at top -->
<div class="draw-toolbar">

  <!-- Row 1: tools + colors + size + fill + clear -->
  <div class="toolbar-row">
    <button class="t-btn active" data-tool="pencil">
      <svg class="icon icon-sm"><use href="icons.svg#icon-pencil"/></svg>Draw
    </button>
    <button class="t-btn" data-tool="line">
      <svg class="icon icon-sm"><use href="icons.svg#icon-shape-line"/></svg>Line
    </button>
    <button class="t-btn" data-tool="rect">
      <svg class="icon icon-sm"><use href="icons.svg#icon-shape-rect"/></svg>Rect
    </button>
    <button class="t-btn" data-tool="circle">
      <svg class="icon icon-sm"><use href="icons.svg#icon-shape-circle"/></svg>Circle
    </button>
    <button class="t-btn" data-tool="eraser">
      <svg class="icon icon-sm"><use href="icons.svg#icon-eraser"/></svg>Erase
    </button>
    <button class="t-btn" data-tool="move">
      <svg class="icon icon-sm" viewBox="0 0 24 24" fill="currentColor"><path d="M13 6v5h5V7l4 4-4 4v-4h-5v5h4l-4 4-4-4h4v-5H8v4l-4-4 4-4v4h5V6h-4l4-4 4 4h-4z"/></svg>Move
    </button>

    <div class="t-sep"></div>

    <div class="swatch-row" id="swatches"></div>

    <div class="t-sep"></div>

    <div class="size-row">
      <span>Size</span>
      <input type="range" id="brushSize" min="2" max="36" value="8">
    </div>

    <div class="t-sep"></div>

    <div class="fill-pill" id="fillPill" style="display:none;">
      <button type="button" class="mini-sw" id="fillSwitch" role="switch" aria-checked="false"><span class="kn"></span></button>
      Fill
    </div>

    <div class="t-sep"></div>

    <button class="t-btn" id="clearBtn">
      <svg class="icon icon-sm"><use href="icons.svg#icon-trash"/></svg>Clear
    </button>
  </div>

  <!-- Row 2: shape stamps -->
  <div class="toolbar-row">
    <span style="font-size:11px;font-weight:800;color:var(--ink-soft);flex-shrink:0;">Shapes →</span>
    <div class="stamp-row" id="shapeStamps"></div>
  </div>

  <!-- Row 3: stickers (emoji) -->
  <div class="toolbar-row">
    <span style="font-size:11px;font-weight:800;color:var(--ink-soft);flex-shrink:0;">Stickers →</span>
    <div class="sticker-row" id="stickerRow"></div>
  </div>

</div>

<div class="canvas-section">
  <div class="canvas-stack">
    <canvas id="drawCanvas"></canvas>
    <canvas id="previewCanvas"></canvas>
    <canvas id="shapeCanvas"></canvas>
  </div>
</div>

<div class="draw-actions">
  <button class="btn btn-primary" id="saveDrawBtn">Save my drawing</button>
  <button class="btn btn-secondary" id="downloadBtn">
    <svg class="icon icon-sm"><use href="icons.svg#icon-download"/></svg>&nbsp;Download
  </button>
</div>
<p class="draw-tip">Tip: Stamp a shape or sticker → it switches to Move tool so you can drag it around. Tap a shape to select it.</p>

<div class="toast" id="toast">Saved! Taking you home…</div>

<script src="data.js"></script>
<script>
Swelli.requireSession();
Swelli.setupAvatarPill();

// ==============================================================
// CANVAS SETUP
// ==============================================================
const drawCanvas = document.getElementById('drawCanvas');
const previewCanvas = document.getElementById('previewCanvas');
const shapeCanvas = document.getElementById('shapeCanvas');
const ctx = drawCanvas.getContext('2d');
const pctx = previewCanvas.getContext('2d');
const sctx = shapeCanvas.getContext('2d');

let ratio = window.devicePixelRatio || 1;

function fitCanvas(c, context, fillWhite){
  const rect = c.parentElement.getBoundingClientRect();
  c.width = rect.width * ratio; c.height = rect.height * ratio;
  context.scale(ratio, ratio);
  if(fillWhite){ context.fillStyle='#fff'; context.fillRect(0,0,rect.width,rect.height); }
}
function resizeAll(){
  ratio = window.devicePixelRatio || 1;
  // Preserve drawing
  const prev = document.createElement('canvas');
  prev.width = drawCanvas.width; prev.height = drawCanvas.height;
  prev.getContext('2d').drawImage(drawCanvas,0,0);
  fitCanvas(drawCanvas, ctx, true);
  fitCanvas(previewCanvas, pctx, false);
  fitCanvas(shapeCanvas, sctx, false);
  const rect = drawCanvas.getBoundingClientRect();
  ctx.drawImage(prev, 0, 0, prev.width/ratio, prev.height/ratio);
  renderObjects();
}
window.addEventListener('resize', resizeAll);
resizeAll();

// ==============================================================
// TOOLS & COLORS
// ==============================================================
const COLORS = ['#25393A','#FF8A65','#F4B740','#3FB3A2','#6CC6FF','#C77DFF','#FF6B9A','#7BD389','#8B5E3C','#FFFFFF'];
let currentColor = COLORS[0];
let tool = 'pencil';
let fillShape = false;

// Color swatches
const swatchWrap = document.getElementById('swatches');
COLORS.forEach((c,i)=>{
  const b = document.createElement('button');
  b.className = 't-swatch' + (i===0?' selected':'');
  b.style.background = c;
  if(c==='#FFFFFF') b.style.boxShadow='inset 0 0 0 1px #ccc';
  b.title = c;
  b.addEventListener('click', ()=>{
    currentColor=c;
    document.querySelectorAll('.t-swatch').forEach(s=>s.classList.remove('selected'));
    b.classList.add('selected');
  });
  swatchWrap.appendChild(b);
});

// Tool buttons
const fillPill = document.getElementById('fillPill');
document.querySelectorAll('.t-btn[data-tool]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    tool=btn.dataset.tool;
    document.querySelectorAll('.t-btn[data-tool]').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    fillPill.style.display = (tool==='rect'||tool==='circle') ? 'flex' : 'none';
    tool==='move' ? enableObjectInteraction() : disableObjectInteraction();
  });
});

// Fill switch
const fillSwitch = document.getElementById('fillSwitch');
fillSwitch.addEventListener('click',()=>{
  fillShape=!fillShape;
  fillSwitch.classList.toggle('checked',fillShape);
  fillSwitch.setAttribute('aria-checked',String(fillShape));
});

// ==============================================================
// FREEHAND DRAWING
// ==============================================================
let drawing=false, startX=0,startY=0,lastX=0,lastY=0;
function canvasPos(e, c){ const r=c.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }

function strokeSetup(ctx2, erasing){
  ctx2.strokeStyle = erasing ? '#fff' : currentColor;
  ctx2.fillStyle = erasing ? '#fff' : currentColor;
  ctx2.lineWidth = parseInt(document.getElementById('brushSize').value);
  ctx2.lineCap='round'; ctx2.lineJoin='round';
}

function drawShape2(c2, x0,y0,x1,y1){
  c2.beginPath();
  if(tool==='line'){ c2.moveTo(x0,y0); c2.lineTo(x1,y1); c2.stroke(); }
  else if(tool==='rect'){ if(fillShape) c2.fillRect(x0,y0,x1-x0,y1-y0); else c2.strokeRect(x0,y0,x1-x0,y1-y0); }
  else if(tool==='circle'){ const rx=Math.abs(x1-x0)/2,ry=Math.abs(y1-y0)/2,cx=(x0+x1)/2,cy=(y0+y1)/2; c2.ellipse(cx,cy,rx,ry,0,0,Math.PI*2); if(fillShape) c2.fill(); else c2.stroke(); }
}

function onDown(e){
  if(tool==='move') return;
  drawCanvas.setPointerCapture && drawCanvas.setPointerCapture(e.pointerId);
  drawing=true;
  const p=canvasPos(e,drawCanvas); startX=lastX=p.x; startY=lastY=p.y;
  strokeSetup(ctx, tool==='eraser');
}
function onMove(e){
  if(!drawing||tool==='move') return;
  const p=canvasPos(e,drawCanvas);
  if(tool==='pencil'||tool==='eraser'){
    strokeSetup(ctx,tool==='eraser');
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(p.x,p.y); ctx.stroke();
    lastX=p.x; lastY=p.y;
  } else {
    const r=previewCanvas.getBoundingClientRect();
    pctx.clearRect(0,0,r.width,r.height);
    strokeSetup(pctx,false);
    drawShape2(pctx,startX,startY,p.x,p.y);
  }
}
function onUp(e){
  if(!drawing||tool==='move') return;
  drawing=false;
  if(tool!=='pencil'&&tool!=='eraser'){
    const p=canvasPos(e,drawCanvas);
    strokeSetup(ctx,false);
    drawShape2(ctx,startX,startY,p.x,p.y);
    const r=previewCanvas.getBoundingClientRect();
    pctx.clearRect(0,0,r.width,r.height);
  }
}
drawCanvas.addEventListener('pointerdown',onDown);
drawCanvas.addEventListener('pointermove',onMove);
drawCanvas.addEventListener('pointerup',onUp);
drawCanvas.addEventListener('pointercancel',onUp);

// ==============================================================
// OBJECT LAYER — moveable shapes AND stickers
// ==============================================================
const objects = [];
let selectedObj = null;
let isDragging = false;
let dragOx=0, dragOy=0;

function drawObj(c2, obj){
  const {x,y,size:s,color} = obj;
  c2.fillStyle=color; c2.strokeStyle=color; c2.lineWidth=2; c2.lineJoin='round';
  if(obj.type==='emoji'){
    c2.font=`${s}px serif`;
    c2.textAlign='center'; c2.textBaseline='middle';
    c2.fillText(obj.char, x, y);
    return;
  }
  c2.beginPath();
  switch(obj.type){
    case 'heart': c2.moveTo(x,y-s*0.3); c2.bezierCurveTo(x,y-s*0.6,x+s*.5,y-s*.6,x+s*.5,y-s*.3); c2.bezierCurveTo(x+s*.5,y,x,y+s*.4,x,y+s*.4); c2.bezierCurveTo(x,y+s*.4,x-s*.5,y,x-s*.5,y-s*.3); c2.bezierCurveTo(x-s*.5,y-s*.6,x,y-s*.6,x,y-s*.3); break;
    case 'star': for(let i=0;i<10;i++){ const r=i%2===0?s:s*.4,a=Math.PI*i/5-Math.PI/2; i===0?c2.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):c2.lineTo(x+r*Math.cos(a),y+r*Math.sin(a)); } break;
    case 'circle': c2.arc(x,y,s*.5,0,Math.PI*2); break;
    case 'rect': c2.rect(x-s*.5,y-s*.4,s,s*.8); break;
    case 'triangle': c2.moveTo(x,y-s*.5); c2.lineTo(x+s*.5,y+s*.4); c2.lineTo(x-s*.5,y+s*.4); break;
    case 'diamond': c2.moveTo(x,y-s*.5); c2.lineTo(x+s*.4,y); c2.lineTo(x,y+s*.5); c2.lineTo(x-s*.4,y); break;
    case 'sun': c2.arc(x,y,s*.32,0,Math.PI*2); c2.fill(); c2.beginPath(); for(let i=0;i<8;i++){ const a=Math.PI*2*i/8; c2.moveTo(x+s*.38*Math.cos(a),y+s*.38*Math.sin(a)); c2.lineTo(x+s*.52*Math.cos(a),y+s*.52*Math.sin(a)); } c2.lineWidth=3; c2.stroke(); return;
    case 'arrow': c2.moveTo(x-s*.5,y-s*.12); c2.lineTo(x+s*.1,y-s*.12); c2.lineTo(x+s*.1,y-s*.3); c2.lineTo(x+s*.5,y); c2.lineTo(x+s*.1,y+s*.3); c2.lineTo(x+s*.1,y+s*.12); c2.lineTo(x-s*.5,y+s*.12); break;
    case 'cloud': c2.arc(x-s*.18,y,s*.3,Math.PI,0); c2.arc(x+s*.18,y,s*.3,Math.PI,0); c2.arc(x,y-s*.18,s*.26,Math.PI,0); c2.arc(x-s*.32,y,s*.2,0,Math.PI); c2.arc(x+s*.32,y,s*.2,0,Math.PI); break;
    case 'flower': for(let i=0;i<5;i++){ const a=Math.PI*2*i/5; const px=x+s*.28*Math.cos(a),py=y+s*.28*Math.sin(a); c2.beginPath(); c2.arc(px,py,s*.2,0,Math.PI*2); c2.fill(); } c2.beginPath(); c2.arc(x,y,s*.18,0,Math.PI*2); c2.fillStyle='#fff'; c2.fill(); return;
  }
  c2.closePath(); c2.fill();
}

function renderObjects(){
  const r = shapeCanvas.getBoundingClientRect();
  sctx.clearRect(0,0,r.width*ratio,r.height*ratio);
  objects.forEach(obj=>{
    drawObj(sctx,obj);
    if(obj===selectedObj){
      const pad = obj.type==='emoji' ? obj.size*0.55 : obj.size*0.6;
      sctx.strokeStyle='#25393A'; sctx.lineWidth=2; sctx.setLineDash([5,4]);
      sctx.strokeRect(obj.x-pad,obj.y-pad,pad*2,pad*2);
      sctx.setLineDash([]);
    }
  });
}

function hitTest(x,y,obj){
  const pad = obj.type==='emoji' ? obj.size*0.55 : obj.size*0.6;
  return Math.abs(x-obj.x)<pad && Math.abs(y-obj.y)<pad;
}

function enableObjectInteraction(){
  shapeCanvas.style.pointerEvents='auto';
  shapeCanvas.addEventListener('pointerdown', objDown);
}
function disableObjectInteraction(){
  shapeCanvas.style.pointerEvents='none';
  shapeCanvas.removeEventListener('pointerdown', objDown);
}
shapeCanvas.style.pointerEvents='none';

function objDown(e){
  const p=canvasPos(e,shapeCanvas);
  let hit=null;
  for(let i=objects.length-1;i>=0;i--){ if(hitTest(p.x,p.y,objects[i])){ hit=objects[i]; break; } }
  selectedObj=hit; renderObjects();
  if(hit){
    isDragging=true; dragOx=p.x-hit.x; dragOy=p.y-hit.y;
    shapeCanvas.setPointerCapture(e.pointerId);
    shapeCanvas.addEventListener('pointermove', objMove);
    shapeCanvas.addEventListener('pointerup', objUp);
  }
}
function objMove(e){
  if(!isDragging||!selectedObj) return;
  const p=canvasPos(e,shapeCanvas);
  selectedObj.x=p.x-dragOx; selectedObj.y=p.y-dragOy;
  renderObjects();
}
function objUp(){ isDragging=false; shapeCanvas.removeEventListener('pointermove',objMove); shapeCanvas.removeEventListener('pointerup',objUp); }

function stampObject(type, extra){
  const r=drawCanvas.getBoundingClientRect();
  const size = Math.min(r.width,r.height)*0.15;
  objects.push({ type, x:r.width/2, y:r.height/2, size, color:currentColor, ...extra });
  renderObjects();
  // Auto-switch to move
  tool='move';
  document.querySelectorAll('.t-btn[data-tool]').forEach(b=>b.classList.remove('active'));
  document.querySelector('.t-btn[data-tool="move"]').classList.add('active');
  enableObjectInteraction();
  fillPill.style.display='none';
}

function flattenAll(){
  objects.forEach(obj=>drawObj(ctx,obj));
  objects.length=0; selectedObj=null;
  const r=shapeCanvas.getBoundingClientRect();
  sctx.clearRect(0,0,r.width*ratio,r.height*ratio);
}

// ==============================================================
// SHAPE STAMPS — labeled, with mini canvas preview
// ==============================================================
const SHAPES_DEFS=[
  {id:'heart',label:'Heart'},{id:'star',label:'Star'},{id:'circle',label:'Circle'},
  {id:'rect',label:'Square'},{id:'triangle',label:'Triangle'},{id:'diamond',label:'Diamond'},
  {id:'sun',label:'Sun'},{id:'arrow',label:'Arrow'},{id:'cloud',label:'Cloud'},{id:'flower',label:'Flower'},
];
const stampRow = document.getElementById('shapeStamps');
SHAPES_DEFS.forEach(sh=>{
  const b=document.createElement('button');
  b.className='t-btn';
  const mc=document.createElement('canvas');
  mc.className='stamp-preview'; mc.width=32; mc.height=32;
  const m=mc.getContext('2d');
  drawObj(m,{type:sh.id,x:16,y:16,size:22,color:currentColor||'#3FB3A2'});
  b.appendChild(mc);
  b.appendChild(document.createTextNode(sh.label));
  b.addEventListener('click',()=> stampObject(sh.id));
  stampRow.appendChild(b);
});

// ==============================================================
// STICKERS — moveable emoji objects on the shape layer
// ==============================================================
const STICKERS=[
  ['❤️','fluent-emoji:red-heart'],['⭐','fluent-emoji:star'],['☀️','fluent-emoji:sun'],
  ['🌈','fluent-emoji:rainbow'],['🌱','fluent-emoji:seedling'],['🔥','fluent-emoji:fire'],
  ['✨','fluent-emoji:sparkles'],['🎈','fluent-emoji:balloon'],['🏆','fluent-emoji:trophy'],
  ['🦋','fluent-emoji:butterfly'],['🎵','fluent-emoji:musical-note'],['🍀','fluent-emoji:four-leaf-clover'],
  ['💪','fluent-emoji:flexed-biceps'],['🌙','fluent-emoji:crescent-moon'],['🎨','fluent-emoji:artist-palette'],
  ['🐾','fluent-emoji:paw-prints'],['💡','fluent-emoji:light-bulb'],['🌸','fluent-emoji:cherry-blossom'],
];
const stickerRowEl=document.getElementById('stickerRow');
STICKERS.forEach(([char,icon])=>{
  const b=document.createElement('button');
  b.className='s-sticker';
  b.innerHTML=`<iconify-icon icon="${icon}" width="22" height="22"></iconify-icon>`;
  b.title='Stamp sticker';
  b.addEventListener('click',()=>{
    // Add as an emoji object that can be dragged
    stampObject('emoji',{char,color:'#000'});
  });
  stickerRowEl.appendChild(b);
});

// ==============================================================
// CLEAR + SAVE + DOWNLOAD
// ==============================================================
document.getElementById('clearBtn').addEventListener('click',()=>{
  const r=drawCanvas.getBoundingClientRect();
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,r.width,r.height);
  objects.length=0; selectedObj=null;
  renderObjects();
});

const toast=document.getElementById('toast');
document.getElementById('saveDrawBtn').addEventListener('click',()=>{
  flattenAll();
  Swelli.saveAndGoHome({activity:'drawing',activityDetail:'Drew a picture'},toast);
});
document.getElementById('downloadBtn').addEventListener('click',()=>{
  flattenAll();
  const link=document.createElement('a');
  link.download='my-swelli-drawing.png';
  link.href=drawCanvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
