<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swelli — Check In</title>
<link rel="stylesheet" href="style.css">
<style>
  .checkin-card{ max-width: 560px; margin: 0 auto; text-align:center; }
  .checkin-card h1{ font-size: 24px; margin-bottom: 4px; }
  .checkin-card .sub{ color: var(--ink-soft); font-weight:700; margin: 0 0 6px; }
  textarea{
    width:100%; min-height: 100px; border-radius: var(--radius-md); border:2px solid var(--line);
    padding: 14px 16px; font-family:'Nunito'; font-size:15px; font-weight:600; resize: vertical;
    background: var(--cream); margin-top: 6px;
  }
  textarea:focus{ outline:none; border-color: var(--mint); background:#fff; }
  .switch-row{ display:flex; align-items:center; gap:10px; justify-content:flex-start; }
  .mini-switch{ width:40px; height:22px; border-radius:999px; background:#FBDFAF; position:relative; border:none; padding:0; flex-shrink:0; }
  .mini-switch .knob{ position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; transition: left .15s; }
  .mini-switch.checked{ background:#E0A22A; }
  .mini-switch.checked .knob{ left:20px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back" onclick="location.href='home.html'" aria-label="Back to home">←</button>
  <div class="brand"><span class="brand-name">Swelli for Education</span></div>
  <nav>
    <a href="home.html">Home</a>
    <a href="checkin.html" class="active">Check In</a>
  </nav>
</div>

<div class="page narrow">
  <div class="card checkin-card">
    <h1 class="display">How are you feeling today? 🌤️</h1>
    <p class="sub">Tap the face that matches your mood.</p>

    <!-- Mood faces stay real emoji here — this is the one feelings check-in. -->
    <div class="mood-grid" id="moodGrid">
      <button class="mood-btn" data-mood="happy">😊<span class="label">Happy</span></button>
      <button class="mood-btn" data-mood="laughing">😂<span class="label">Silly</span></button>
      <button class="mood-btn" data-mood="tired">🥱<span class="label">Tired</span></button>
      <button class="mood-btn" data-mood="angry">😠<span class="label">Angry</span></button>
      <button class="mood-btn" data-mood="sad">😢<span class="label">Sad</span></button>
      <button class="mood-btn" data-mood="anxious">😟<span class="label">Worried</span></button>
    </div>

    <label for="note" style="display:block; font-weight:800; font-size:14px; text-align:left; margin-bottom:0;">Tell us why you feel this way (optional)</label>
    <textarea id="note" placeholder="You can write or just leave this blank…"></textarea>

    <div class="plan-card" id="planCard" style="display:none;">
      <div class="plan-head">
        <svg class="icon"><use href="icons.svg#icon-flag"/></svg>
        A note for your counselor
      </div>
      <p>You can send a private note straight to <span id="counselorName">your counselor</span> right now if you'd like to.</p>
      <div class="switch-row">
        <button type="button" class="mini-switch" id="planSwitch" role="switch" aria-checked="false"><span class="knob"></span></button>
        <label for="planSwitch">Yes, I'd like to send a note</label>
      </div>
      <textarea id="counselorNote" style="display:none; margin-top:12px;" placeholder="What's going on? This goes straight to your counselor."></textarea>
    </div>

    <button class="btn btn-primary btn-block" id="nextBtn" style="margin-top:20px;" disabled>Next →</button>
  </div>
</div>

<script src="data.js"></script>
<script>
  const session = Swelli.requireSession();

  if(session && session.hasPlan){
    document.getElementById('planCard').style.display = 'block';
    document.getElementById('counselorName').textContent = 'Ms. Alvarez';
  }

  const planSwitch = document.getElementById('planSwitch');
  const counselorNote = document.getElementById('counselorNote');
  planSwitch.addEventListener('click', ()=>{
    const checked = !planSwitch.classList.contains('checked');
    planSwitch.classList.toggle('checked', checked);
    planSwitch.setAttribute('aria-checked', String(checked));
    counselorNote.style.display = checked ? 'block' : 'none';
  });

  let selected = null;
  document.querySelectorAll('.mood-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      selected = btn.dataset.mood;
      document.getElementById('nextBtn').disabled = false;
    });
  });

  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(!selected || !session) return;
    const note = document.getElementById('note').value.trim();
    const sendToCounselor = planSwitch.classList.contains('checked');
    const counselorNoteText = counselorNote.value.trim();

    Swelli.addEntry({
      mood: selected,
      note,
      forCounselor: sendToCounselor,
      counselorNote: sendToCounselor ? counselorNoteText : '',
    });

    // Safety check: scans the note (and counselor note, if sent) for
    // language suggesting self-harm, abuse, eating disorder, or similar
    // concerns. See data.js for important caveats about this scanner.
    const hits = [
      ...Swelli.checkAndFlag(note, 'Check-in note'),
      ...(sendToCounselor ? Swelli.checkAndFlag(counselorNoteText, 'Counselor note') : []),
    ];

    const goToUnwind = () => { window.location.href = 'unwind.html'; };

    if(hits.length){
      Swelli.updateLastEntry({ flagged: true, flagCategories: hits.map(h => h.category) });
      Swelli.showSafetyOverlay(hits, goToUnwind);
    } else {
      goToUnwind();
    }

    // Production note: actually delivering the counselor note (e.g. an
    // email/Sheets row your counselor sees) needs a backend call here —
    // a natural fit for your existing Apps Script pattern.
  });
</script>
</body>
</html>
